<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Diary</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="img/favicon.ico" />
  </head>
  <body>
    <header>
      <img src="img/mainvisual.jpg" alt="main-visual" class="main-visual" />
    </header>
    <section class="main">
      <div class="container">
        <div class="title">Recipe Diary</div>
        <div class="comment">
          日々の料理レシピをまとめています。<br />
          和食や洋食、中華、お菓子までいろいろな料理レシピをアップしていますので、<br />
          みなさんの献立にお役立てくださいね！
        </div>
      </div>
    </section>
    <section class="photos">
      <div class="photo"><img src="img/recipe1.jpg" alt="recipe1" /></div>
      <div class="photo"><img src="img/recipe2.jpg" alt="recipe2" /></div>
      <div class="photo"><img src="img/recipe3.jpg" alt="recipe3" /></div>
    </section>
    <div class="recipe">
      <a href="#">レシピ一覧を見る</a>
    </div>
    <footer>
      <div class="sns">
        <div class="buttons">
          <div class="Instagram"><a href="#">Instagram</a></div>
          <div class="Twitter"><a href="#">Twitter</a></div>
          <div class="" Facebook><a href="#">Facebook</a></div>
        </div>
      </div>
      <p>Ⓒ2021 Recipe Diary</p>
    </footer>
  </body>
</html>
